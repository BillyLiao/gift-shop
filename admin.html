<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>店主後台 — 歡迎光臨</title>
<link rel="stylesheet" href="css/base.css">
<style>
  body { background: #2a4a3f; padding: 24px; }
  .panel {
    max-width: 1080px; margin: 0 auto; background: #c0c0c0;
    border-top: 2px solid #fff; border-left: 2px solid #fff;
    border-right: 2px solid #404040; border-bottom: 2px solid #404040;
    box-shadow: 4px 4px 0 rgba(0,0,0,.4);
    font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
  }
  .panel-body { padding: 14px; }
  #mode-banner { font-size: 12px; color: #800000; margin: 0 0 10px; }
  /* 登入 */
  #login-view { max-width: 360px; margin: 0 auto; padding: 30px 0; }
  #login-view label { display: block; margin: 8px 0; font-size: 14px; }
  #login-view input { display: block; width: 100%; margin-top: 3px; padding: 6px;
    border: 2px inset #808080; font-family: inherit; }
  #login-err { color: #c00000; font-size: 13px; min-height: 1.2em; }
  /* 工具列 */
  .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
  .toolbar select, .toolbar input {
    border: 2px inset #808080; background: #fff; padding: 4px 6px;
    font-family: inherit; font-size: 13px; }
  .toolbar .spacer { flex: 1; }
  #stats { font-size: 13px; color: #333; }
  /* 訂單表 */
  table { width: 100%; border-collapse: collapse; background: #fff;
    border: 2px inset #808080; font-size: 13px; }
  th { background: #000080; color: #fff; padding: 5px 8px; text-align: left; font-weight: normal; }
  td { padding: 5px 8px; border-bottom: 1px solid #ddd; }
  tbody tr { cursor: pointer; }
  tbody tr:hover { background: #e8f0ff; }
  tbody tr.sel { background: #000080; color: #fff; }
  .st { padding: 1px 7px; border-radius: 8px; font-size: 12px; white-space: nowrap; }
  .st-待處理 { background: #fff3cd; color: #7a5b00; }
  .st-已出貨 { background: #cfe2ff; color: #084298; }
  .st-已完成 { background: #d1e7dd; color: #0a5239; }
  .st-退貨申請 { background: #ffd6e7; color: #92175c; }
  .st-退貨完成 { background: #e2d9f3; color: #4b2d83; }
  .st-已取消 { background: #e9ecef; color: #555; }
  tr.sel .st { filter: none; }
  /* 詳情 */
  #detail { margin-top: 12px; background: #fff; border: 2px inset #808080;
    padding: 12px; font-size: 14px; display: none; }
  #detail.show { display: block; }
  #detail h3 { margin: 0 0 8px; font-size: 15px; }
  .d-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 18px; margin-bottom: 10px; }
  .d-grid div { font-size: 13px; }
  .d-grid b { color: #555; font-weight: normal; margin-right: 4px; }
  .d-items { border: 1px solid #ccc; padding: 6px 10px; margin-bottom: 10px; font-size: 13px; }
  .d-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    border-top: 1px solid #ccc; padding-top: 10px; }
  .d-actions select, .d-actions input { border: 2px inset #808080; padding: 4px 6px;
    font-family: inherit; font-size: 13px; }
  #d-tracking { width: 200px; }
  #d-return { background: #fff0f6; border: 1px solid #f0a6c8; padding: 8px 10px;
    margin-top: 8px; font-size: 13px; display: none; }
  #save-msg { font-size: 13px; color: #006400; min-height: 1.2em; }
</style>
</head>
<body>
<div class="panel">
  <div class="dlg-titlebar"><span>店主後台 — 訂單管理</span><span id="who" style="font-size:12px;font-weight:normal"></span></div>
  <div class="panel-body">
    <p id="mode-banner"></p>

    <div id="login-view">
      <label>Email<input id="lg-email" type="email" autocomplete="username"></label>
      <label>密碼<input id="lg-pass" type="password" autocomplete="current-password"></label>
      <p id="login-err"></p>
      <button class="w95-btn primary" id="lg-btn">登入</button>
    </div>

    <div id="admin-view" style="display:none">
      <div class="toolbar">
        <select id="f-status"><option value="">全部狀態</option></select>
        <input id="f-kw" type="text" placeholder="搜尋編號／姓名／Email">
        <button class="w95-btn sm" id="btn-reload">↻ 重新整理</button>
        <span class="spacer"></span>
        <span id="stats"></span>
        <button class="w95-btn sm" id="btn-csv">匯出 CSV</button>
      </div>
      <table>
        <thead><tr>
          <th>訂單編號</th><th>日期</th><th>買家</th><th>金額</th><th>取貨</th><th>付款</th><th>狀態</th>
        </tr></thead>
        <tbody id="rows"></tbody>
      </table>

      <div id="detail">
        <h3 id="d-no"></h3>
        <div class="d-items" id="d-items"></div>
        <div class="d-grid" id="d-grid"></div>
        <div id="d-return"></div>
        <div class="d-actions">
          <label>狀態 <select id="d-status"></select></label>
          <label>物流單號 <input id="d-tracking" type="text" placeholder="出貨後填入"></label>
          <a id="d-trackurl" target="_blank" style="font-size:13px"></a>
          <button class="w95-btn primary" id="d-save">儲存</button>
          <span id="save-msg"></span>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="js/config.js"></script>
<script src="js/backend.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
