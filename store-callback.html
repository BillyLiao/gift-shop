<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>門市選擇完成</title>
<style>
  body { font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
         background: #c0c0c0; display: flex; align-items: center;
         justify-content: center; height: 100vh; margin: 0; }
  .box { background: #fff; border: 2px inset #808080; padding: 24px 32px;
         text-align: center; }
</style>
</head>
<body>
<div class="box" id="box">門市資料處理中…</div>
<script>
/* ezShip 電子地圖 rtURL 回拋頁：
   GET 參數 stCode / stName / stAddr / stTel → 回傳給開啟視窗並自動關閉 */
(function () {
  var p = new URLSearchParams(location.search);
  var store = {
    code: p.get("stCode") || "",
    name: p.get("stName") || "",
    addr: p.get("stAddr") || "",
  };
  var box = document.getElementById("box");
  if (!store.name && !store.code) {
    box.textContent = "沒有收到門市資料——請回到地圖重新選擇。";
    return;
  }
  var payload = JSON.stringify({ t: Date.now(), store: store });
  try { localStorage.setItem("giftshop-store-pick", payload); } catch (e) {}
  if (window.opener) {
    try { window.opener.postMessage({ type: "giftshop-store-pick", store: store }, "*"); } catch (e) {}
  }
  box.innerHTML = "已選擇：<b>" + store.name + (store.code ? " (" + store.code + ")" : "") +
    "</b><br>視窗即將關閉…";
  setTimeout(function () { window.close(); }, 900);
})();
</script>
</body>
</html>
